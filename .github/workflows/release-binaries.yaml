name: Release Binaries

# This workflow is triggered after the `release` job in `release-plz.yml` successfully publishes a GitHub Release.
on:
    release:
        types: [published]

permissions: {}

jobs:
    upload-assets:
        name: Build and Upload Assets for ${{ matrix.target }}
        # This job will only run if:
        # 1. The action is running in the original repository, not a fork.
        if: github.repository_owner == 'seferino-fernandez'
        permissions:
            contents: write
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Linux (amd64, arm64)
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                    # macOS (Intel & Apple Silicon)
                    - target: x86_64-apple-darwin
                      os: macos-latest
                    - target: aarch64-apple-darwin
                      os: macos-latest
                    # Windows (amd64, arm64)
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                    - target: aarch64-pc-windows-msvc
                      os: windows-latest

        timeout-minutes: 30

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7
              with:
                  ref: ${{ github.ref_name }}

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install linker for Linux aarch64 cross-compilation
              if: runner.os == 'Linux' && matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Build binaries
              run: cargo build --release --locked --bin rhood --bin rhood-mcp --target ${{ matrix.target }}
              env:
                  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

            - name: Upload rhood (CLI) to release
              uses: taiki-e/upload-rust-binary-action@v1
              with:
                  bin: rhood
                  target: ${{ matrix.target }}
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tar: unix
                  zip: windows

            - name: Upload rhood-mcp (MCP server) to release
              uses: taiki-e/upload-rust-binary-action@v1
              with:
                  bin: rhood-mcp
                  target: ${{ matrix.target }}
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tar: unix
                  zip: windows
