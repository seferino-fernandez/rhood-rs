name: release-plz

on:
    push:
        branches:
            - main

permissions: {}

jobs:
    # Create/update the standing release PR (version bump + changelog).
    release-pr:
        name: release-plz PR
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            pull-requests: write
        concurrency:
            group: release-plz-${{ github.ref }}
            cancel-in-progress: false
        steps:
            - &checkout
              name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - &install-rust
              name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Close old release PR
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # List all opened PRs which head branch starts with "release-plz-"
                  release_pr=$(gh pr list --state='open' --json number,headRefName --jq '.[] | select(.headRefName | startswith("release-plz-")) | .number')
                  # Close the release PR if there is one
                  if [[ -n "$release_pr" ]]; then
                      echo "Closing old release PR $release_pr"
                      gh pr close $release_pr
                  else
                      echo "No open release PR"
                  fi
            - name: Run release-plz
              uses: release-plz/action@v0.5
              with:
                  command: release-pr
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

    # Publish crates + create the unified tag/Release when a version bump lands.
    release:
        name: release-plz release
        runs-on: ubuntu-latest
        if: ${{ github.repository_owner == 'seferino-fernandez' }}
        permissions:
            contents: write
            id-token: write
            pull-requests: read
        steps:
            - *checkout
            - *install-rust

            - name: Run release-plz
              uses: release-plz/action@v0.5
              with:
                  command: release
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
